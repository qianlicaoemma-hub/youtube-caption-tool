<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube 逐字稿工具</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260506-1" />
  </head>
  <body>
    <section id="authGate" class="auth-gate" hidden>
      <form id="authForm" class="auth-card">
        <p class="eyebrow">Private access</p>
        <h2>请输入访问密码</h2>
        <input id="passwordInput" type="password" placeholder="访问密码" autocomplete="current-password" />
        <button class="primary-button" type="submit">进入</button>
        <p id="authError" class="auth-error"></p>
      </form>
    </section>

    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Local transcript workspace</p>
            <h1>YouTube 逐字稿工具</h1>
          </div>
          <div class="status" id="statusText">待处理</div>
        </header>

        <form id="transcriptForm" class="control-panel">
          <label class="field wide">
            <span>YouTube 链接</span>
            <input id="urlInput" type="url" placeholder="https://www.youtube.com/watch?v=..." required />
          </label>

          <label class="field" id="modeField">
            <span>处理方式</span>
            <select id="modeInput">
              <option value="auto">字幕优先，失败后音频识别</option>
              <option value="audio">强制音频识别</option>
              <option value="captions">只读取 YouTube 字幕</option>
            </select>
          </label>

          <label class="field">
            <span>语言</span>
            <select id="languageInput">
              <option value="auto">自动</option>
              <option value="zh">中文</option>
              <option value="en">英文</option>
            </select>
          </label>

          <label class="field" id="browserField">
            <span>YouTube 登录态</span>
            <select id="browserInput">
              <option value="auto">自动尝试</option>
              <option value="chrome:Profile 1">Chrome Profile 1</option>
              <option value="chrome:Profile 12">Chrome Profile 12</option>
              <option value="chrome:Default">Chrome Default</option>
              <option value="chrome">Chrome</option>
              <option value="safari">Safari</option>
              <option value="firefox">Firefox</option>
              <option value="edge">Edge</option>
              <option value="">不使用</option>
            </select>
          </label>

          <label class="field checkbox-field" id="translateField">
            <span>翻译</span>
            <label class="check-row">
              <input id="translateInput" type="checkbox" />
              <span>同时输出中文逐字翻译</span>
            </label>
          </label>

          <button class="primary-button" type="submit" id="submitButton">
            <span>生成逐字稿</span>
          </button>
        </form>

        <section id="publicNotice" class="public-notice" hidden>
          公开版只读取 YouTube 可用字幕，不启用 OpenAI 音频识别、中文翻译或私人浏览器登录态。
        </section>

        <section class="progress-line" aria-live="polite">
          <span id="progressText">粘贴链接后开始。</span>
        </section>

        <section class="result-area">
          <div class="result-toolbar">
            <div>
              <p class="label">输出</p>
              <h2 id="titleText">还没有逐字稿</h2>
            </div>
            <div class="actions">
              <button type="button" id="copyButton" disabled>复制</button>
              <a id="mdLink" class="download disabled" href="#">Markdown</a>
              <a id="txtLink" class="download disabled" href="#">TXT</a>
              <a id="docxLink" class="download disabled" href="#">Word</a>
            </div>
          </div>
          <pre id="transcriptOutput">生成后会显示在这里。</pre>
          <div id="streamingIndicator" class="streaming-indicator" hidden>
            <span>正在继续识别</span><span class="typing-dots" aria-hidden="true"></span>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/app.js?v=20260506-2"></script>
  </body>
</html>
