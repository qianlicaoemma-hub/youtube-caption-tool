<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verbatim · YouTube 逐字稿工具</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260510-1" />
  </head>
  <body>
    <section id="authGate" class="auth-gate" hidden>
      <form id="authForm" class="auth-card">
        <p class="eyebrow">Private access</p>
        <h2>请输入访问密码</h2>
        <input id="passwordInput" type="password" placeholder="访问密码" autocomplete="current-password" />
        <button class="primary-button" type="submit">进入</button>
        <p id="authError" class="auth-error"></p>
      </form>
    </section>

    <div class="app">
      <button id="sidebarToggle" type="button" class="sidebar-toggle" aria-label="切换侧栏">
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
          <path d="M2.5 4h11M2.5 8h11M2.5 12h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        </svg>
      </button>

      <aside class="sidebar" id="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">Verbatim</span>
        </a>
        <p class="sidebar-eyebrow">最近</p>
        <div id="recentList" class="recent-list" role="list">
          <p class="recent-empty">还没有任务。<br/>粘贴一个链接开始。</p>
        </div>
        <div id="sidebarResizer" class="sidebar-resizer" aria-hidden="true" title="拖动调整宽度"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-brand">
            <span class="brand-mark small" aria-hidden="true"></span>
            <span class="topbar-title">Verbatim</span>
            <span class="topbar-tag">逐字稿工具</span>
          </div>
          <div class="status" id="statusText">待处理</div>
        </header>

        <section class="hero">
          <h1 class="hero-title">
            把任何 YouTube 视频<br/>
            转成<em>逐字稿</em>
          </h1>
          <p class="hero-lede">粘贴链接 · 自动识别字幕状态 · 中英文都支持</p>
        </section>

        <form id="transcriptForm" class="prompt-form">
          <div class="prompt-input">
            <svg class="prompt-icon" viewBox="0 0 20 20" width="18" height="18" aria-hidden="true">
              <path d="M8.5 11.5a3 3 0 0 1 0-4.24l2.12-2.12a3 3 0 1 1 4.24 4.24l-1.06 1.06M11.5 8.5a3 3 0 0 1 0 4.24l-2.12 2.12a3 3 0 1 1-4.24-4.24l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            </svg>
            <input id="urlInput" type="url" placeholder="粘贴 YouTube 链接，例如 https://youtube.com/watch?v=..." required autocomplete="off" />
            <button class="primary-button" type="submit" id="submitButton">
              <span>识别</span>
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" class="primary-button-arrow">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </button>
          </div>

          <div class="examples">
            <span class="examples-label">试试看</span>
            <button type="button" class="chip" data-example-url="https://www.youtube.com/watch?v=arj7oStGLkU">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
                <path d="M2 4h12v8H2zM6 7.5l3 .5-3 .5z" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
              </svg>
              <span>有字幕的英文视频</span>
            </button>
            <button type="button" class="chip" data-example-url="https://www.youtube.com/watch?v=Xxz5uh0L1mE">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
                <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
                <path d="M8 4.5v3.5l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
              </svg>
              <span>无字幕的中文视频</span>
            </button>
          </div>

          <details class="advanced">
            <summary>
              <span>高级设置</span>
              <span class="advanced-hint">默认值已经能覆盖 95% 场景</span>
              <svg viewBox="0 0 16 16" width="12" height="12" aria-hidden="true" class="advanced-chevron">
                <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </summary>
            <div class="advanced-grid">
              <label class="field" id="modeField">
                <span class="field-label">处理方式</span>
                <select id="modeInput">
                  <option value="auto">自动（推荐）— 有字幕就用，没有就调 AI</option>
                  <option value="audio">AI 转录（绕过字幕）</option>
                  <option value="captions">仅用字幕（无字幕则报错）</option>
                </select>
                <span class="field-help">字幕路径零成本；AI 转录按音频时长收费</span>
              </label>

              <label class="field">
                <span class="field-label">语言</span>
                <select id="languageInput">
                  <option value="auto">自动检测</option>
                  <option value="zh">中文</option>
                  <option value="en">英文</option>
                </select>
                <span class="field-help">不确定就选自动</span>
              </label>

              <label class="field" id="browserField">
                <span class="field-label">YouTube 登录态</span>
                <select id="browserInput">
                  <option value="auto">自动尝试</option>
                  <option value="chrome:Profile 1">Chrome — Profile 1</option>
                  <option value="chrome:Profile 12">Chrome — Profile 12</option>
                  <option value="chrome:Default">Chrome — Default</option>
                  <option value="chrome">Chrome（任意 profile）</option>
                  <option value="safari">Safari</option>
                  <option value="firefox">Firefox</option>
                  <option value="edge">Edge</option>
                  <option value="">不使用</option>
                </select>
                <span class="field-help">YouTube 提示需要登录验证时，选你已登录的浏览器</span>
              </label>
            </div>
          </details>
        </form>

        <section id="publicNotice" class="public-notice" hidden>
          公开版只读取 YouTube 可用字幕，不启用音频识别或私人浏览器登录态。
        </section>

        <section class="progress-line" aria-live="polite">
          <span class="progress-dot" aria-hidden="true"></span>
          <span id="progressText">粘贴链接后开始。</span>
        </section>

        <section class="result-area">
          <header class="result-toolbar">
            <div class="result-meta">
              <p class="label">输出</p>
              <h2 id="titleText">还没有逐字稿</h2>
            </div>
            <div class="actions">
              <button type="button" id="copyButton" disabled>复制全文</button>
              <a id="mdLink" class="download disabled" href="#">Markdown</a>
              <a id="txtLink" class="download disabled" href="#">TXT</a>
              <a id="docxLink" class="download disabled" href="#">Word</a>
            </div>
          </header>
          <div id="transcriptOutput" class="transcript-output">生成后会显示在这里。</div>
          <div id="streamingIndicator" class="streaming-indicator" hidden>
            <span>正在继续识别</span><span class="typing-dots" aria-hidden="true"></span>
          </div>
        </section>

        <footer class="footnote">
          <span>本地运行 · 你的火山账户 · 没有数据外传</span>
        </footer>
      </main>
    </div>
    <script src="/static/app.js?v=20260510-1"></script>
  </body>
</html>
